<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@400;700;900&display=swap');
  * { -webkit-tap-highlight-color: transparent; user-select: none; }
  body {
    margin: 0;
    font-family: 'Nunito', 'ZCOOL KuaiLe', system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
  }
  .font-fun { font-family: 'ZCOOL KuaiLe', cursive; }

  /* 浮动动画 */
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }
  @keyframes float-slow {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-5px) rotate(2deg); }
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-3deg); }
    75% { transform: rotate(3deg); }
  }
  @keyframes pulse-soft {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  @keyframes drift {
    0% { transform: translateX(0px); }
    100% { transform: translateX(20px); }
  }
  @keyframes pop-in {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  @keyframes confetti {
    0% { transform: translateY(0) rotate(0); opacity: 1; }
    100% { transform: translateY(400px) rotate(720deg); opacity: 0; }
  }
  @keyframes star-burst {
    0% { transform: scale(0) rotate(0); opacity: 1; }
    100% { transform: scale(2) rotate(180deg); opacity: 0; }
  }
  @keyframes feed-fly {
    0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
    30% { transform: translate(-50%, -30px) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, 60px) scale(0.3); opacity: 0; }
  }
  @keyframes drift-up {
    0% { transform: translateY(0) scale(0.5); opacity: 0; }
    30% { transform: translateY(-20px) scale(1.2); opacity: 1; }
    100% { transform: translateY(-80px) scale(1); opacity: 0; }
  }
  @keyframes count-pop {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.4); }
  }

  .animate-float { animation: float 3s ease-in-out infinite; }
  .animate-float-slow { animation: float-slow 5s ease-in-out infinite; }
  .animate-wiggle { animation: wiggle 1.5s ease-in-out infinite; }
  .animate-pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }
  .animate-pop-in { animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
  .animate-slide-up { animation: slide-up 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .animate-shake { animation: shake 0.4s; }

  .btn-press { transition: all 0.15s; }
  .btn-press:active { transform: scale(0.92); }

  /* 自定义滚动 */
  .scroll-area { -webkit-overflow-scrolling: touch; }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* 海浪动画 */
  .wave {
    background: linear-gradient(180deg, transparent, rgba(255,255,255,0.3));
    animation: drift 4s ease-in-out infinite alternate;

</style>

// ============================================
const Critter = ({ id, size = 100, shadow = false }) => {
  const filter = shadow ? 'brightness(0)' : '';
  const wrapStyle = { width: size, height: size, filter };
  return (
    <div style={wrapStyle} className="inline-block">
      <svg viewBox="0 0 100 100" width={size} height={size} xmlns="http://www.w3.org/2000/svg">
        {CRITTER_SVG[id] || <text x="50" y="55" textAnchor="middle" fontSize="60">❓</text>}
      </svg>
    </div>
  );
};

// 伙伴穿戴饰品的版本
const CritterWithAccessories = ({ id, size = 100, equipped = [] }) => {
  const accessoriesByPriority = ['wings', 'hat', 'face', 'neck']; // 渲染顺序
  const equippedAccs = ACCESSORIES.filter(a => equipped.includes(a.id));

  return (
    <div style={{ width: size, height: size }} className="inline-block relative">
      <svg viewBox="0 0 100 100" width={size} height={size} xmlns="http://www.w3.org/2000/svg">
        {/* 翅膀放在底层 */}
        {equippedAccs.filter(a => a.slot === 'wings').map(a => <g key={a.id}>{a.svg}</g>)}
        {/* 主体 */}
        {CRITTER_SVG[id]}
        {/* 围巾 */}
        {equippedAccs.filter(a => a.slot === 'neck').map(a => <g key={a.id}>{a.svg}</g>)}

        {equippedAccs.filter(a => a.slot === 'face').map(a => <g key={a.id}>{a.svg}</g>)}
        {/* 帽子放在最上层（注意 SVG 顶部的部分坐标会超出 viewBox） */}
        {equippedAccs.filter(a => a.slot === 'hat').map(a => <g key={a.id}>{a.svg}</g>)}
      </svg>
    </div>
  );
};

const isAccessoryUnlocked = (acc, state) => {
  const u = acc.unlock;
  if (u.type === 'collected') return state.collected.length >= u.count;
  if (u.type === 'fed') return state.companionFed >= u.count;
  if (u.type === 'island') {
    const stars = Object.values(state.progress[u.islandId]?.stars || {}).reduce((a, b) => a + b, 0);
    return stars >= u.stars;
  }
  return false;
};

const getMoodLevel = (mood) => {
  if (mood >= 80) return { label: '超开心', emoji: '🥰', color: '#FF8FA3' };
  if (mood >= 50) return { label: '开心', emoji: '😊', color: '#FFB562' };
  if (mood >= 30) return { label: '一般', emoji: '😐', color: '#A8B5C7' };
  if (mood >= 10) return { label: '难过', emoji: '🥺', color: '#7C68C2' };
  return { label: '伤心', emoji: '😢', color: '#5C3A8A' };
};

// 根据心情/阶段返回伙伴主动台词
const getCompanionMoodLine = (mood, stage, name) => {
  if (mood >= 80) return `${name}超喜欢你～`;
  if (mood >= 50) return `${name}今天很开心！`;
  if (mood >= 30) return `${name}有点想你～`;
  if (mood >= 10) return `${name}有点难过...`;
  return `${name}好想你呀...`;
};


const isIslandUnlocked = (island, state) => {
  if (island.unlocked) return true;
  if (island.id === 'transport') {
    // 通关动物岛 3 关
    const animalsCompleted = Object.values(state.progress.animals?.stars || {}).filter(s => s > 0).length;
    return animalsCompleted >= 3;
  }
  if (island.id === 'mystery') {
    return state.collected.length >= 14;
  }
  return false;
};

// 预加载缓存：把 base64 转成可重复播放的 Audio 对象
const REAL_SOUND_CACHE = {};
Object.keys(REAL_SOUNDS).forEach(k => {
  REAL_SOUND_CACHE[k] = new Audio(REAL_SOUNDS[k]);
  REAL_SOUND_CACHE[k].preload = 'auto';

class SoundManager {
  constructor() {
    this.ctx = null;
    this.enabled = true;
  }
  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }
  play(type) {
    if (!this.enabled) return;
    try {
      this.init();
      const ctx = this.ctx;
      const now = ctx.currentTime;

      if (type === 'click') {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain).connect(ctx.destination);
        osc.frequency.value = 800;
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
        gain.gain.value = 0.15;
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      } else if (type === 'success') {
        // 上行三音
        [523, 659, 784].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain).connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = 'sine';
          gain.gain.value = 0;
          gain.gain.linearRampToValueAtTime(0.2, now + i * 0.1 + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.2);
          osc.start(now + i * 0.1);
          osc.stop(now + i * 0.1 + 0.2);
        });
      } else if (type === 'unlock') {
        // 闪亮的解锁音
        [659, 784, 1047, 1319].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain).connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = 'sine';
          gain.gain.value = 0;
          gain.gain.linearRampToValueAtTime(0.15, now + i * 0.08 + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.3);
          osc.start(now + i * 0.08);
          osc.stop(now + i * 0.08 + 0.3);
        });
      } else if (type === 'pop') {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain).connect(ctx.destination);
        osc.frequency.value = 400;
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.05);
        gain.gain.value = 0.1;
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        osc.start(now);
        osc.stop(now + 0.05);
      }
    } catch(e) { console.warn('audio error', e); }
  }

  // 播放动物 / 水果叫声（优先真实音频，否则合成）
  playCritterSound(id) {
    if (!this.enabled) return;

    // 1. 优先用真实音频
    if (REAL_SOUND_CACHE[id]) {
      try {
        const audio = REAL_SOUND_CACHE[id];
        audio.currentTime = 0;
        audio.volume = 0.85;
        const playPromise = audio.play();
        if (playPromise) playPromise.catch(() => {});
        return;
      } catch(e) { console.warn('real sound error', e); }
    }

    // 2. 回退到 Web Audio 合成
    try {
      this.init();
      const ctx = this.ctx;
      const now = ctx.currentTime;

      const cfg = CRITTER_SOUNDS[id];
      if (!cfg) return;

      cfg.notes.forEach((note, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        osc.connect(filter).connect(gain).connect(ctx.destination);

        osc.type = note.wave || cfg.wave || 'sawtooth';
        filter.type = 'lowpass';
        filter.frequency.value = note.filter || cfg.filter || 2000;

        const tStart = now + (note.t || i * (cfg.gap || 0.15));
        const dur = note.d || cfg.dur || 0.2;

        osc.frequency.setValueAtTime(note.f, tStart);
        if (note.f2) osc.frequency.exponentialRampToValueAtTime(note.f2, tStart + dur);

        gain.gain.setValueAtTime(0, tStart);
        gain.gain.linearRampToValueAtTime(cfg.vol || 0.2, tStart + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, tStart + dur);

        osc.start(tStart);
        osc.stop(tStart + dur + 0.05);
      });
    } catch(e) { console.warn('critter sound', e); }
  }
}

// ============================================
// 语音引导（Web Speech API）
// ============================================
let speechReady = false;
const speak = (text) => {
  try {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = 0.9;
    u.pitch = 1.2; // 偏高，更童趣
    window.speechSynthesis.speak(u);
    speechReady = true;
  } catch(e) {}
};

// ============================================
// 工具：洗牌、随机选 N 个、生成题目
// ============================================
const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const pickN = (arr, n) => shuffle(arr).slice(0, n);

// 生成一关的题目数组
// 每次进入都是新的随机组合 → 复玩有新鲜感
const generateQuestions = (level, islandItems) => {
  const itemMap = Object.fromEntries(islandItems.map(i => [i.id, i]));
  const allItems = islandItems;
  // 每次随机洗牌池，保证多次玩有不同顺序
  const poolItems = shuffle(level.pool.map(id => itemMap[id]));

  // 主类型生成，mixed 类型每题随机一种
  const NUM_QUESTIONS = level.type === 'mixed' ? 4 : 3;
  const questions = [];

  for (let i = 0; i < NUM_QUESTIONS; i++) {
    const t = level.type === 'mixed'
      ? ['recognize', 'find', 'sound', 'shadow', 'count'][Math.floor(Math.random() * 5)]
      : level.type;

    // 目标在 pool 内随机循环，但不重复出现
    const target = poolItems[i % poolItems.length];

    if (t === 'recognize') {
      questions.push({
        type: 'recognize',
        target,
        hint: `这是${target.name}`,
      });
    } else if (t === 'find' || t === 'sound' || t === 'shadow' || t === 'match') {
      const distractors = pickN(allItems.filter(x => x.id !== target.id), 3);
      const options = shuffle([target, ...distractors]);
      questions.push({
        type: t,
        target,
        options,
        hint: t === 'sound' ? `听一听，是哪个？` :
              t === 'shadow' ? `这个影子是谁？` :
              t === 'match' ? `找到一样的` :
              `找出${target.name}`,
      });
    } else if (t === 'count') {
      const count = Math.floor(Math.random() * 4) + 1; // 1-4
      const choices = shuffle([count, count + 1, Math.max(1, count - 1), Math.min(5, count + 2)]);
      questions.push({
        type: 'count',
        target,
        count,
        options: [...new Set(choices)].slice(0, 4),
        hint: `数一数，有几个${target.name}？`,
      });
    }
  }

  return questions;
};

// ============================================
// 关卡引擎
// ============================================
const LevelScreen = ({ island, level, onBack, onComplete }) => {
  const [questions] = useState(() => generateQuestions(level, island.items));
  const [qIdx, setQIdx] = useState(0);
  const [feedback, setFeedback] = useState(null); // 'right' | 'wrong'
  const [wrongCount, setWrongCount] = useState(0);
  const [shake, setShake] = useState(false);
  const [showSparkles, setShowSparkles] = useState(false);
  const [showPerfect, setShowPerfect] = useState(false);
  const [idleHint, setIdleHint] = useState(false);

  const q = questions[qIdx];
  const progress = ((qIdx) / questions.length) * 100;

  // 进入题目时自动朗读
  useEffect(() => {
    if (!q) return;
    setFeedback(null);
    setIdleHint(false);
    const timer = setTimeout(() => {
      speak(q.hint);
      if (q.type === 'recognize' || q.type === 'sound') {
        setTimeout(() => sound.playCritterSound(q.target.id), 1000);
      }
    }, 300);
    // 5 秒未操作 → 显示提示动画
    const idleTimer = setTimeout(() => {
      setIdleHint(true);
    }, 5500);
    return () => { clearTimeout(timer); clearTimeout(idleTimer); };
  }, [qIdx]);

  if (!q) return null;

  const handleAnswer = (chosen) => {
    if (feedback) return;
    setIdleHint(false);

    let correct = false;
    if (q.type === 'recognize') {
      correct = true;
    } else if (q.type === 'count') {
      correct = chosen === q.count;
    } else {
      correct = chosen.id === q.target.id;
    }

    if (correct) {
      sound.play('success');
      setFeedback('right');
      setShowSparkles(true);
      speak(q.type === 'recognize' ? `你认识${q.target.name}啦` : pickRightPhrase());

      setTimeout(() => {
        setShowSparkles(false);
        if (qIdx + 1 < questions.length) {
          setQIdx(qIdx + 1);
        } else {
          // 关卡结束
          const stars = wrongCount <= 1 ? 3 : wrongCount === 2 ? 2 : 1;
          // 完美关卡：全对，弹"完美"特效
          if (wrongCount === 0) {
            setShowPerfect(true);
            sound.play('unlock');
            setTimeout(() => {
              setShowPerfect(false);
              onComplete(island.id, level.id, stars);
            }, 2500);
          } else {
            setTimeout(() => onComplete(island.id, level.id, stars), 600);
          }
        }
      }, 1400);
    } else {
      sound.play('pop');
      setFeedback('wrong');
      setShake(true);
      setWrongCount(c => c + 1);
      speak(pickRetryPhrase());
      setTimeout(() => {
        setShake(false);
        setFeedback(null);
      }, 800);
    }
  };

  return (
    <div className="w-full h-full relative overflow-hidden flex flex-col"
      style={{ background: `linear-gradient(180deg, ${island.bgFrom}, ${island.bgTo})` }}>

      {/* 顶部：返回 + 进度条 */}
      <div className="absolute top-4 left-4 right-4 flex items-center gap-3 z-20">
        <button onClick={() => { sound.play('pop'); onBack(); }}
          className="bg-white/90 w-11 h-11 rounded-full shadow-lg btn-press flex items-center justify-center flex-shrink-0">
          <span className="text-2xl">←</span>
        </button>
        <div className="flex-1 bg-white/40 rounded-full h-4 overflow-hidden shadow-inner">
          <div className="h-full bg-gradient-to-r from-yellow-300 to-pink-400 rounded-full transition-all duration-500"
            style={{ width: `${progress}%` }}/>
        </div>
        <div className="bg-white/90 rounded-full px-3 h-11 flex items-center font-bold text-gray-700 text-sm">
          {qIdx + 1}/{questions.length}
        </div>
      </div>

      {/* 题目区 */}
      <div className="flex-1 flex flex-col items-center justify-center px-4 pt-20 pb-4">

        {/* 提示气泡 */}
        <div className="bg-white rounded-2xl px-5 py-3 shadow-lg mb-4 flex items-center gap-2 animate-pop-in">
          <button onClick={() => speak(q.hint)} className="text-2xl btn-press">🔊</button>
          <span className="font-bold text-gray-800">{q.hint}</span>
        </div>

        {/* 题目主体 */}
        <div className="flex-1 w-full flex items-center justify-center">
          <QuestionView q={q} feedback={feedback} shake={shake} showSparkles={showSparkles} onAnswer={handleAnswer}/>
        </div>

        {/* 空闲提示气泡（5秒未操作） */}
        {idleHint && !feedback && (
          <div className="absolute bottom-20 left-1/2 -translate-x-1/2 bg-yellow-100 border-2 border-yellow-400 rounded-2xl px-4 py-2 shadow-lg animate-pop-in">
            <button onClick={() => speak(q.hint)} className="text-sm font-bold text-amber-800">
              👆 试一试看，再听一次？
            </button>
          </div>
        )}
      </div>

      {/* 完美关卡特效覆盖层 */}
      {showPerfect && (
        <div className="absolute inset-0 z-30 flex items-center justify-center pointer-events-none bg-gradient-to-b from-yellow-300/40 to-orange-300/40 animate-pop-in">
          <Confetti active={true}/>
          <div className="text-center">
            <div className="font-fun text-6xl text-orange-600 drop-shadow-lg animate-pop-in"
              style={{ textShadow: '0 0 20px rgba(255, 215, 0, 0.8)' }}>
              ⭐ 完美！⭐
            </div>
            <div className="font-bold text-2xl text-orange-700 mt-2 animate-pop-in" style={{ animationDelay: '0.3s' }}>
              全部答对啦！
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const WardrobeScreen = ({ state, onClose, onUpdate }) => {
  const equipped = state.equippedAccessories || [];

  const toggleAccessory = (acc) => {
    if (!isAccessoryUnlocked(acc, state)) {
      sound.play('pop');
      speak(`${acc.desc}才能解锁`);
      return;
    }
    sound.play('click');
    const isEquipped = equipped.includes(acc.id);
    let newEquipped;
    if (isEquipped) {
      newEquipped = equipped.filter(id => id !== acc.id);
    } else {
      // 同 slot 的其他饰品要先卸下
      const sameSlot = ACCESSORIES.filter(a => a.slot === acc.slot && a.id !== acc.id).map(a => a.id);
      newEquipped = [...equipped.filter(id => !sameSlot.includes(id)), acc.id];
    }
    onUpdate({ equippedAccessories: newEquipped });
  };

  return (
    <div className="fixed inset-0 z-50 overflow-hidden"
      style={{ background: 'linear-gradient(180deg, #FFF3D6 0%, #FFE8C2 100%)' }}>

      <div className="bg-white/80 shadow p-4 flex items-center gap-3">
        <button onClick={() => { sound.play('pop'); onClose(); }}
          className="w-11 h-11 rounded-full bg-white shadow btn-press flex items-center justify-center">
          <span className="text-2xl">←</span>
        </button>
        <div className="font-fun text-xl text-amber-700">👗 衣柜</div>
      </div>

        <div className="bg-white rounded-3xl p-4 shadow-lg">

        </div>

        <div className="text-xs font-bold text-amber-700 mb-2">可佩戴的饰品 · 点击穿/脱</div>
        <div className="grid grid-cols-3 gap-3">

                className={`bg-white rounded-2xl p-3 btn-press shadow border-4 transition relative

  const [feeding, setFeeding] = useState(false);

  const [showLevelUp, setShowLevelUp] = useState(false);

  const stage = getGrowthStage(state.companionFed);
  const moodLevel = getMoodLevel(state.companionMood);
  const moodLine = getCompanionMoodLine(state.companionMood, stage.stage, state.companionName);

  const progress = stage.next
    ? ((state.companionFed - (stage.stage === 0 ? 0 : 10)) / (stage.next - (stage.stage === 0 ? 0 : 10))) * 100
    : 100;

  const handleFeed = () => {
    if (state.berries < 2) {
      speak('果子用完啦，去玩游戏可以赚到哦');
      return;
    }
    if (feeding) return;
    setFeeding(true);
    setShowFlying(true);
    sound.play('pop');

    setTimeout(() => {
      sound.playCritterSound(state.companion);
      const oldStage = getGrowthStage(state.companionFed).stage;
      const newStage = getGrowthStage(state.companionFed + 1).stage;
      const willLevelUp = newStage > oldStage;

      onUpdate({
        berries: state.berries - 2,
        companionFed: state.companionFed + 1,
        companionMood: Math.min(100, state.companionMood + 3),
      });
      setShowFlying(false);
      setFeeding(false);

      if (willLevelUp) {
        setTimeout(() => {
          sound.play('unlock');
          setShowLevelUp(true);
        }, 300);
      }
    }, 600);
  };

  const handlePat = () => {
    sound.playCritterSound(state.companion);
    onUpdate({ companionMood: Math.min(100, state.companionMood + 1) });

const App = () => {
  const [state, setState] = useState(loadState);
  const [showSplash, setShowSplash] = useState(true);
  const [screen, setScreen] = useState('home'); // home | island | level
  const [currentIsland, setCurrentIsland] = useState(null);
  const [currentLevel, setCurrentLevel] = useState(null);
  const [showWin, setShowWin] = useState(null);
  const [showParent, setShowParent] = useState(false);
  const [showDex, setShowDex] = useState(false);
  const [showDaily, setShowDaily] = useState(false);
  const [showCompanion, setShowCompanion] = useState(false);
  const [showWardrobe, setShowWardrobe] = useState(false);
  const [showAchievements, setShowAchievements] = useState(false);
  const [pendingAchievement, setPendingAchievement] = useState(null);

  // 监听 state 变化，检测新解锁的成就
  useEffect(() => {
    setState(prev => {
      const earned = computeAchievements(prev).map(a => a.id);
      const known = prev.unlockedAchievements || [];
      const newly = earned.filter(id => !known.includes(id));
      if (newly.length === 0) return prev;

      const newAch = ACHIEVEMENTS.find(a => a.id === newly[0]);
      const totalReward = newly.reduce((sum, id) => {
        const a = ACHIEVEMENTS.find(x => x.id === id);
        return sum + (a.reward || 0);
      }, 0);
      // 弹窗交给下次 render 触发
      setTimeout(() => setPendingAchievement(newAch), 600);
      return {
        ...prev,
        unlockedAchievements: [...known, ...newly],
        berries: prev.berries + totalReward,
      };
    });
  }, [state.collected, state.companionFed, state.berries, state.companion,
      state.equippedAccessories, state.progress]);

  // 启动时：心情衰减
  useEffect(() => {
    const today = new Date().toISOString().slice(0, 10);
    setState(prev => {
      const updates = {};
      // 心情衰减：每天没来 -10，最多累计 -20
      if (prev.companion && prev.lastVisitDate && prev.lastVisitDate !== today) {
        const daysSince = Math.floor(
          (new Date(today) - new Date(prev.lastVisitDate)) / (1000 * 60 * 60 * 24)
        );
        if (daysSince > 0) {
          const drop = Math.min(20, daysSince * 10);
          updates.companionMood = Math.max(0, prev.companionMood - drop);
        }
      }
      updates.lastVisitDate = today;
      return { ...prev, ...updates };
    });
  }, []);

  // 每日宝箱：选好伙伴后才弹（避免选伙伴和宝箱叠加）
  useEffect(() => {
    if (!state.companion) return;
    const today = new Date().toISOString().slice(0, 10);
    if (state.lastDailyDate === today) return;
    const t = setTimeout(() => setShowDaily(true), 1200);
    return () => clearTimeout(t);
  }, [state.companion]);

  const handleDailyClaim = (reward) => {
    const today = new Date().toISOString().slice(0, 10);
    setState(prev => ({ ...prev, berries: prev.berries + reward, lastDailyDate: today }));
    setShowDaily(false);
  };

  const handlePickCompanion = (id, name) => {
    setState(prev => ({ ...prev, companion: id, companionName: name }));
  };

  const handleCompanionUpdate = (updates) => {
    setState(prev => ({ ...prev, ...updates }));
  };

  useEffect(() => { saveState(state); }, [state]);

  const handleIslandClick = (island) => {
    if (!island.unlocked) {
      sound.play('pop');
      return;
    }
    setCurrentIsland(island);
    setScreen('island');
  };

  const handleLevelClick = (level) => {
    setCurrentLevel(level);
    setScreen('level');
  };

  const handleLevelComplete = (islandId, levelId, stars) => {
    // 提前算出"这次新解锁的"
    const island = ISLANDS.find(i => i.id === islandId);
    const level = island.levels.find(l => l.id === levelId);
    const newlyUnlocked = level.pool
      .filter(itemId => !state.collected.includes(itemId))
      .map(itemId => island.items.find(i => i.id === itemId))
      .filter(Boolean);

    // 计算奖励
    const oldStars = state.progress[islandId]?.stars[levelId] || 0;
    const isNew = oldStars === 0;
    const earnedBerries = isNew ? 5 + stars : Math.max(0, stars - oldStars) * 2;

    setState(prev => {
      const newCollected = [...prev.collected];
      level.pool.forEach(itemId => {
        if (!newCollected.includes(itemId)) newCollected.push(itemId);
      });

      return {
        ...prev,
        progress: {
          ...prev.progress,
          [islandId]: {
            ...prev.progress[islandId],
            stars: { ...prev.progress[islandId].stars, [levelId]: Math.max(oldStars, stars) },
          },
        },
        berries: prev.berries + earnedBerries,
        collected: newCollected,
        companionMood: Math.min(100, prev.companionMood + 5),
      };
    });
    setShowWin({ stars, berries: earnedBerries, newlyUnlocked });
  };

  const handleReset = () => {
    localStorage.removeItem(STORAGE_KEY);
    setState(loadState());
    setScreen('home');
  };

  return (
    <div className="fixed inset-0 bg-gray-100 flex items-center justify-center">
      <div className="w-full h-full max-w-md max-h-[900px] relative bg-white shadow-2xl md:rounded-3xl overflow-hidden">
        {showSplash && (
          <SplashScreen
            isFirstTime={!state.companion}
            onDone={() => setShowSplash(false)}/>
        )}
        {!state.companion && !showSplash && (
          <CompanionPicker onPick={handlePickCompanion}/>
        )}
        {screen === 'home' && state.companion && (
          <HomeScreen state={state}
            onIslandClick={handleIslandClick}
            onParentMode={() => setShowParent(true)}
            onOpenDex={() => setShowDex(true)}
            onOpenCompanion={() => setShowCompanion(true)}
            onOpenAchievements={() => setShowAchievements(true)}/>
        )}
        {screen === 'island' && currentIsland && (
          <IslandScreen
            island={currentIsland}
            state={state}
            onBack={() => setScreen('home')}
            onLevelClick={handleLevelClick}
          />
        )}
        {screen === 'level' && currentIsland && currentLevel && (
          <LevelScreen
            island={currentIsland}
            level={currentLevel}
            onBack={() => setScreen('island')}
            onComplete={handleLevelComplete}
          />
        )}
        {showWin && (
          <WinModal stars={showWin.stars} berries={showWin.berries}
            newlyUnlocked={showWin.newlyUnlocked}
            onClose={() => { setShowWin(null); setScreen('island'); }}/>
        )}
        {showParent && (
          <ParentMode state={state} onClose={() => setShowParent(false)} onReset={handleReset}/>
        )}
        {showDex && (
          <DexScreen state={state} onClose={() => setShowDex(false)}/>
        )}
        {showDaily && (
          <DailyBox onClaim={handleDailyClaim}/>
        )}
        {showCompanion && state.companion && (
          <CompanionScreen state={state}
            onClose={() => setShowCompanion(false)}
            onUpdate={handleCompanionUpdate}
            onOpenWardrobe={() => setShowWardrobe(true)}/>
        )}
        {showWardrobe && state.companion && (
          <WardrobeScreen state={state}
            onClose={() => setShowWardrobe(false)}
            onUpdate={handleCompanionUpdate}/>
        )}
        {showAchievements && (
          <AchievementsScreen state={state} onClose={() => setShowAchievements(false)}/>
        )}
        {pendingAchievement && (
          <AchievementUnlock achievement={pendingAchievement}
            onClose={() => { sound.play('click'); setPendingAchievement(null); }}/>
        )}
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
